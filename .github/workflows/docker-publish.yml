name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag override
        required: false
        type: string
      platforms:
        description: Comma-separated Docker platforms
        required: false
        default: linux/amd64,linux/arm64
        type: string
      push_latest:
        description: Also push latest tag
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "*.*.*"
      - "*.*.*.*"

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      IMAGE_NAME: celading/soonlink
      IGNITE_GIT_URL: ${{ vars.IGNITE_GIT_URL != '' && vars.IGNITE_GIT_URL || 'https://gitcode.com/cinyu/ignite-cangjie.git' }}
      LISI_GIT_URL: ${{ vars.LISI_GIT_URL != '' && vars.LISI_GIT_URL || 'https://gitcode.com/cinyu/lisi.git' }}
      JINGUISSL_GIT_URL: ${{ vars.JINGUISSL_GIT_URL != '' && vars.JINGUISSL_GIT_URL || 'https://gitcode.com/cinyu/jinguiSSL.git' }}
      JINGUISSL_CORE_GIT_URL: ${{ vars.JINGUISSL_CORE_GIT_URL != '' && vars.JINGUISSL_CORE_GIT_URL || 'https://gitcode.com/CjKu/JinguiCore.git' }}
      SEAJSON_GIT_URL: ${{ vars.SEAJSON_GIT_URL != '' && vars.SEAJSON_GIT_URL || 'https://gitcode.com/CjKu/SeaJson.git' }}
      STDX_GIT_REF: v1.1.0-beta.25
      CANGJIE_VERSION: 1.1.0-beta.25
      CANGJIE_SDK_LINUX_ARM64_URL: https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-linux-aarch64-1.1.0-beta.25.tar.gz&objectKey=69cb74a76e8ed61e6e07fd45
      CANGJIE_SDK_LINUX_AMD64_URL: https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-linux-x64-1.1.0-beta.25.tar.gz&objectKey=69cb718e6e8ed61e6e07fd42
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Docker Tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          normalize_release_version() {
            case "$1" in
              v*) printf '%s\n' "${1#v}" ;;
              *) printf '%s\n' "$1" ;;
            esac
          }

          version="$(sed -n 's/^  version = "\(.*\)"/\1/p' cjpm.toml | head -n 1)"
          if [[ -z "${version}" ]]; then
            echo "failed to resolve version from cjpm.toml" >&2
            exit 1
          fi

          image_tag=""
          platforms="linux/amd64,linux/arm64"
          push_latest="false"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            image_tag="${{ inputs.image_tag }}"
            platforms="${{ inputs.platforms }}"
            push_latest="${{ inputs.push_latest }}"
          fi

          if [[ -z "${image_tag}" ]]; then
            if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
              image_tag="$(normalize_release_version "${GITHUB_REF_NAME}")"
              if [[ ! "${image_tag}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
                echo "release tag must use x.y.z or x.y.z.n, got: ${GITHUB_REF_NAME}" >&2
                exit 1
              fi
              if [[ "${image_tag}" != "${version}" && "${image_tag}" != "${version}".* ]]; then
                echo "release tag ${GITHUB_REF_NAME} must match cjpm.toml version ${version} or use ${version}.n" >&2
                exit 1
              fi
            else
              image_tag="${version}-${GITHUB_SHA::7}"
            fi
          fi

          {
            echo "version=${version}"
            echo "image_tag=${image_tag}"
            echo "platforms=${platforms}"
            echo "push_latest=${push_latest}"
            echo "context_dir=${RUNNER_TEMP}/soonlink-docker-context"
            echo "deps_dir=${RUNNER_TEMP}/soonlink-deps"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve Docker publish availability
        id: availability
        shell: bash
        run: |
          if [[ -n "${{ secrets.DOCKERHUB_USERNAME }}" && -n "${{ secrets.DOCKERHUB_TOKEN }}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "enabled=false" >> "${GITHUB_OUTPUT}"
          echo "::warning::Skipping Docker publish because DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not configured."

      - name: Configure GitCode Credentials
        if: ${{ steps.availability.outputs.enabled == 'true' }}
        shell: bash
        run: |
          if [[ -n "${{ secrets.GITCODE_USERNAME }}" && -n "${{ secrets.GITCODE_TOKEN }}" ]]; then
            git config --global url."https://${{ secrets.GITCODE_USERNAME }}:${{ secrets.GITCODE_TOKEN }}@gitcode.com/".insteadOf "https://gitcode.com/"
            exit 0
          fi

          echo "GitCode credentials are not configured; continuing with public clone access."

      - name: Clone Dependency Repositories
        if: ${{ steps.availability.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          clone_dependency() {
            local primary_url="$1"
            local dest_dir="$2"
            local fallback_url="${3:-}"

            if git clone --depth 1 "${primary_url}" "${dest_dir}"; then
              return 0
            fi

            if [[ -n "${fallback_url}" && "${fallback_url}" != "${primary_url}" ]]; then
              echo "::warning::Falling back from ${primary_url} to ${fallback_url}"
              git clone --depth 1 "${fallback_url}" "${dest_dir}"
              return 0
            fi

            return 1
          }

          mkdir -p "${{ steps.vars.outputs.deps_dir }}"
          clone_dependency "${IGNITE_GIT_URL}" "${{ steps.vars.outputs.deps_dir }}/Ignite0500" "https://gitcode.com/cinyu/ignite-cangjie.git"
          clone_dependency "${LISI_GIT_URL}" "${{ steps.vars.outputs.deps_dir }}/lisi"
          clone_dependency "${JINGUISSL_GIT_URL}" "${{ steps.vars.outputs.deps_dir }}/jinguiSSL" "https://gitcode.com/cinyu/jinguiSSL.git"
          clone_dependency "${JINGUISSL_CORE_GIT_URL}" "${{ steps.vars.outputs.deps_dir }}/JinguiCore" "https://gitcode.com/CjKu/JinguiCore.git"
          clone_dependency "${SEAJSON_GIT_URL}" "${{ steps.vars.outputs.deps_dir }}/SeaJson" "https://gitcode.com/CjKu/SeaJson.git"

      - name: Prepare Docker Build Context
        if: ${{ steps.availability.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/prepare_github_docker_context.sh
          ./scripts/prepare_github_docker_context.sh \
            --output "${{ steps.vars.outputs.context_dir }}" \
            --ignite "${{ steps.vars.outputs.deps_dir }}/Ignite0500" \
            --lisi "${{ steps.vars.outputs.deps_dir }}/lisi" \
            --jinguissl "${{ steps.vars.outputs.deps_dir }}/jinguiSSL" \
            --jinguissl-core "${{ steps.vars.outputs.deps_dir }}/JinguiCore" \
            --seajson "${{ steps.vars.outputs.deps_dir }}/SeaJson"

      - name: Set Up QEMU
        if: ${{ steps.availability.outputs.enabled == 'true' }}
        uses: docker/setup-qemu-action@v3

      - name: Set Up Buildx
        if: ${{ steps.availability.outputs.enabled == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log In To Docker Hub
        if: ${{ steps.availability.outputs.enabled == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Tag List
        id: tags
        if: ${{ steps.availability.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "value<<EOF"
            echo "${IMAGE_NAME}:${{ steps.vars.outputs.image_tag }}"
            if [[ "${{ steps.vars.outputs.image_tag }}" != "${{ steps.vars.outputs.version }}" ]]; then
              echo "${IMAGE_NAME}:${{ steps.vars.outputs.version }}"
            fi
            if [[ "${{ steps.vars.outputs.push_latest }}" == "true" ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build And Push Docker Image
        if: ${{ steps.availability.outputs.enabled == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.vars.outputs.context_dir }}
          file: ${{ steps.vars.outputs.context_dir }}/SoonLink-Core/docker/Dockerfile.github
          platforms: ${{ steps.vars.outputs.platforms }}
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.value }}
          build-args: |
            CANGJIE_VERSION=${{ env.CANGJIE_VERSION }}
            STDX_GIT_REF=${{ env.STDX_GIT_REF }}
            CANGJIE_SDK_LINUX_ARM64_URL=${{ env.CANGJIE_SDK_LINUX_ARM64_URL }}
            CANGJIE_SDK_LINUX_AMD64_URL=${{ env.CANGJIE_SDK_LINUX_AMD64_URL }}
          cache-from: type=gha,scope=soonlink-core-docker
          cache-to: type=gha,mode=max,scope=soonlink-core-docker
