name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing or target release tag, for example 0.5.22
        required: false
        type: string
      publish_release:
        description: Publish uploaded bundles to GitHub Releases
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "*.*.*"
      - "*.*.*.*"

permissions:
  contents: write

env:
  CANGJIE_STDX_GIT_REF: ${{ vars.CANGJIE_STDX_GIT_REF != '' && vars.CANGJIE_STDX_GIT_REF || 'v1.1.0-beta.25' }}
  CANGJIE_STDX_REPO: ${{ vars.CANGJIE_STDX_REPO != '' && vars.CANGJIE_STDX_REPO || 'https://gitcode.com/Cangjie/cangjie_stdx' }}
  CANGJIE_STDX_RELEASE_VERSION: ${{ vars.CANGJIE_STDX_RELEASE_VERSION }}
  CANGJIE_NIGHTLY_TAGS_API: ${{ vars.CANGJIE_NIGHTLY_TAGS_API != '' && vars.CANGJIE_NIGHTLY_TAGS_API || 'https://api.gitcode.com/api/v5/repos/Cangjie/nightly_build/tags?per_page=100' }}
  IGNITE_GIT_URL: https://gitcode.com/cinyu/ignite-cangjie.git
  LISI_GIT_URL: https://gitcode.com/cinyu/lisi
  JINGUISSL_GIT_URL: https://atomgit.com/cinyu/jinguiSSL

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.meta.outputs.package_version }}
      release_version: ${{ steps.meta.outputs.release_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      publish_release: ${{ steps.meta.outputs.publish_release }}
      bundle_matrix: ${{ steps.meta.outputs.bundle_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          GITCODE_API_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          set -euo pipefail

          normalize_release_version() {
            case "$1" in
              v*) printf '%s\n' "${1#v}" ;;
              *) printf '%s\n' "$1" ;;
            esac
          }

          resolve_gitcode_latest_tag() {
            if [[ -z "${GITCODE_API_TOKEN:-}" ]]; then
              return 1
            fi

            curl --retry 3 --retry-delay 2 -fsSL "${CANGJIE_NIGHTLY_TAGS_API}" \
              -H 'Accept: application/json' \
              -H "private-token: ${GITCODE_API_TOKEN}" \
              | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next((item.get("name","") for item in data if item.get("name")), ""))'
          }

          resolve_first_reachable_url() {
            for candidate in "$@"; do
              if [[ -z "${candidate}" ]]; then
                continue
              fi
              if curl --retry 2 --retry-delay 2 -fsI "${candidate}" >/dev/null; then
                printf '%s\n' "${candidate}"
                return 0
              fi
            done

            return 1
          }

          package_version="$(sed -n 's/^  version = "\(.*\)"/\1/p' cjpm.toml | head -n 1)"
          if [[ -z "${package_version}" ]]; then
            echo "failed to resolve version from cjpm.toml" >&2
            exit 1
          fi

          release_tag=""
          publish_release="false"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            publish_release="true"
          else
            release_tag="${{ inputs.release_tag }}"
            publish_release="${{ inputs.publish_release }}"
          fi

          if [[ -z "${release_tag}" ]]; then
            release_tag="${package_version}"
          fi

          release_version="$(normalize_release_version "${release_tag}")"
          if [[ ! "${release_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "release tag must use x.y.z or x.y.z.n, got: ${release_tag}" >&2
            exit 1
          fi

          if [[ "${release_version}" != "${package_version}" && "${release_version}" != "${package_version}".* ]]; then
            echo "release tag ${release_tag} must match cjpm.toml version ${package_version} or use ${package_version}.n" >&2
            exit 1
          fi

          linux_amd64_sdk_url="${{ vars.CANGJIE_SDK_LINUX_AMD64_URL }}"
          if [[ -z "${linux_amd64_sdk_url}" ]]; then
            linux_amd64_sdk_url='https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-linux-x64-1.1.0-beta.25.tar.gz&objectKey=69cb718e6e8ed61e6e07fd42'
          fi

          linux_arm64_sdk_url="${{ vars.CANGJIE_SDK_LINUX_ARM64_URL }}"
          if [[ -z "${linux_arm64_sdk_url}" ]]; then
            linux_arm64_sdk_url='https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-linux-aarch64-1.1.0-beta.25.tar.gz&objectKey=69cb74a76e8ed61e6e07fd45'
          fi

          macos_amd64_sdk_url="${{ vars.CANGJIE_SDK_MACOS_AMD64_URL }}"
          if [[ -z "${macos_amd64_sdk_url}" ]]; then
            macos_amd64_sdk_url='https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-mac-x64-1.1.0-beta.25.tar.gz&objectKey=69cb71666e8ed61e6e07fd41'
          fi

          macos_arm64_sdk_url="${{ vars.CANGJIE_SDK_MACOS_ARM64_URL }}"
          if [[ -z "${macos_arm64_sdk_url}" ]]; then
            macos_arm64_sdk_url='https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-mac-aarch64-1.1.0-beta.25.tar.gz&objectKey=69cb73ec6e8ed61e6e07fd43'
          fi

          windows_amd64_sdk_url="${{ vars.CANGJIE_SDK_WINDOWS_AMD64_URL }}"
          if [[ -z "${windows_amd64_sdk_url}" ]]; then
            windows_amd64_sdk_url='https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-windows-x64-1.1.0-beta.25.zip&objectKey=69cb95dc6e8ed61e6e07fd46'
          fi

          deveco_ohos_aarch64_url="${{ vars.DEVECO_CANGJIE_OHOS_AARCH64_URL }}"
          nightly_tag=""
          if [[ -z "${deveco_ohos_aarch64_url}" ]]; then
            nightly_tag="$(resolve_gitcode_latest_tag || true)"
            if [[ -n "${nightly_tag}" ]]; then
              deveco_ohos_aarch64_url="$(resolve_first_reachable_url \
                "https://gitcode.com/Cangjie/nightly_build/releases/download/${nightly_tag}/cangjie-sdk-ohos-aarch64-${nightly_tag}.tar.gz" \
                "https://gitcode.com/Cangjie/nightly_build/-/releases/download/${nightly_tag}/cangjie-sdk-ohos-aarch64-${nightly_tag}.tar.gz" \
                "https://gitcode.com/Cangjie/nightly_build/-/releases/${nightly_tag}/downloads/cangjie-sdk-ohos-aarch64-${nightly_tag}.tar.gz" \
              || true)"
            fi
          fi

          bundle_matrix='{"include":['
          bundle_matrix="${bundle_matrix}{\"runner\":\"ubuntu-latest\",\"target\":\"x86_64-unknown-linux-gnu\",\"artifact_platform\":\"linux-x86_64\",\"sdk_url\":\"${linux_amd64_sdk_url}\"}"
          bundle_matrix="${bundle_matrix},{\"runner\":\"ubuntu-24.04-arm\",\"target\":\"aarch64-unknown-linux-gnu\",\"artifact_platform\":\"linux-aarch64\",\"sdk_url\":\"${linux_arm64_sdk_url}\"}"
          bundle_matrix="${bundle_matrix},{\"runner\":\"macos-15-intel\",\"target\":\"x86_64-apple-darwin\",\"artifact_platform\":\"darwin-x86_64\",\"sdk_url\":\"${macos_amd64_sdk_url}\"}"
          bundle_matrix="${bundle_matrix},{\"runner\":\"macos-14\",\"target\":\"aarch64-apple-darwin\",\"artifact_platform\":\"darwin-aarch64\",\"sdk_url\":\"${macos_arm64_sdk_url}\"}"
          bundle_matrix="${bundle_matrix},{\"runner\":\"windows-latest\",\"target\":\"x86_64-w64-mingw32\",\"artifact_platform\":\"windows-x86_64\",\"sdk_url\":\"${windows_amd64_sdk_url}\"}"
          if [[ -n "${deveco_ohos_aarch64_url}" ]]; then
            bundle_matrix="${bundle_matrix},{\"runner\":\"ubuntu-latest\",\"target\":\"aarch64-linux-ohos\",\"artifact_platform\":\"ohos-aarch64\",\"sdk_url\":\"${linux_amd64_sdk_url}\",\"deveco_sdk_url\":\"${deveco_ohos_aarch64_url}\"}"
          fi

          bundle_matrix="${bundle_matrix}]}"

          {
            echo "package_version=${package_version}"
            echo "release_version=${release_version}"
            echo "release_tag=${release_tag}"
            echo "publish_release=${publish_release}"
            echo "bundle_matrix=${bundle_matrix}"
            echo "nightly_tag=${nightly_tag}"
            echo "deveco_ohos_aarch64_url=${deveco_ohos_aarch64_url}"
          } >> "${GITHUB_OUTPUT}"

  bundles:
    needs: metadata
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.metadata.outputs.bundle_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve bundle availability
        id: availability
        shell: bash
        run: |
          if [[ -z "${{ matrix.sdk_url }}" ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Skipping ${{ matrix.artifact_platform }} bundle because the matching CANGJIE_SDK_*_URL repository variable is not configured."
            exit 0
          fi
          echo "enabled=true" >> "${GITHUB_OUTPUT}"

      - name: Configure GitCode Credentials
        if: ${{ steps.availability.outputs.enabled == 'true' }}
        shell: bash
        run: |
          if [[ -n "${{ secrets.GITCODE_USERNAME }}" && -n "${{ secrets.GITCODE_TOKEN }}" ]]; then
            git config --global url."https://${{ secrets.GITCODE_USERNAME }}:${{ secrets.GITCODE_TOKEN }}@gitcode.com/".insteadOf "https://gitcode.com/"
            exit 0
          fi

          echo "GitCode credentials are not configured; continuing with public clone access."

      - name: Configure AtomGit Credentials
        if: ${{ steps.availability.outputs.enabled == 'true' }}
        shell: bash
        run: |
          if [[ -n "${{ secrets.ATOMGIT_USERNAME }}" && -n "${{ secrets.ATOMGIT_TOKEN }}" ]]; then
            git config --global url."https://${{ secrets.ATOMGIT_USERNAME }}:${{ secrets.ATOMGIT_TOKEN }}@atomgit.com/".insteadOf "https://atomgit.com/"
            exit 0
          fi

          echo "AtomGit credentials are not configured; continuing with public clone access."

      - name: Clone dependency repositories
        if: ${{ steps.availability.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          deps_root="${RUNNER_TEMP}/soonlink-release-deps"
          mkdir -p "${deps_root}"
          git clone --depth 1 "${IGNITE_GIT_URL}" "${deps_root}/Ignite0500"
          git clone --depth 1 "${LISI_GIT_URL}" "${deps_root}/lisi"
          git clone --depth 1 "${JINGUISSL_GIT_URL}" "${deps_root}/jinguiSSL"

      - name: Prepare release workspace
        id: workspace
        if: ${{ steps.availability.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/prepare_release_workspace.sh
          workspace_root="${RUNNER_TEMP}/soonlink-release-workspace/${{ matrix.artifact_platform }}"
          deps_root="${RUNNER_TEMP}/soonlink-release-deps"
          ./scripts/prepare_release_workspace.sh \
            --output "${workspace_root}" \
            --ignite "${deps_root}/Ignite0500" \
            --lisi "${deps_root}/lisi" \
            --jinguissl "${deps_root}/jinguiSSL"
          {
            echo "root=${workspace_root}"
            echo "core_dir=${workspace_root}/SoonLink-Core"
          } >> "${GITHUB_OUTPUT}"

      - name: Install build prerequisites on Linux
        if: ${{ steps.availability.outputs.enabled == 'true' && runner.os == 'Linux' }}
        shell: bash
        run: |
          sudo apt-get update -o Acquire::Retries=5
          sudo apt-get install -y --no-install-recommends build-essential ca-certificates curl file git tar unzip zip

      - name: Install Cangjie SDK and stdx
        id: sdk
        if: ${{ steps.availability.outputs.enabled == 'true' }}
        continue-on-error: true
        shell: bash
        run: |
          chmod +x ./scripts/install_cangjie_ci.sh
          ./scripts/install_cangjie_ci.sh \
            --sdk-url "${{ matrix.sdk_url }}" \
            --sdk-dir "${RUNNER_TEMP}/cangjie" \
            --stdx-dir "${RUNNER_TEMP}/cangjie_stdx" \
            --stdx-repo "${{ env.CANGJIE_STDX_REPO }}" \
            --stdx-ref "${{ env.CANGJIE_STDX_GIT_REF }}" \
            --stdx-release-version "${{ env.CANGJIE_STDX_RELEASE_VERSION }}" \
            --stdx-target "${{ matrix.target }}" \
            --deveco-sdk-url "${{ matrix.deveco_sdk_url }}" \
            --deveco-dir "${RUNNER_TEMP}/deveco_cangjie"

      - name: Build release bundle
        id: bundle
        if: ${{ steps.availability.outputs.enabled == 'true' && steps.sdk.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        working-directory: ${{ steps.workspace.outputs.core_dir }}
        run: |
          set -euo pipefail
          chmod +x ./scripts/build_release_bundle.sh ./scripts/build_release_target.sh
          bundle_paths="$(./scripts/build_release_target.sh \
            --target "${{ matrix.target }}" \
            --target-dir "${RUNNER_TEMP}/build-${{ matrix.artifact_platform }}" \
            --archive-platform "${{ matrix.artifact_platform }}" \
            --version "${{ needs.metadata.outputs.release_version }}")"
          {
            echo "bundle_paths<<EOF"
            printf '%s\n' "${bundle_paths}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload bundle
        if: ${{ steps.availability.outputs.enabled == 'true' && steps.bundle.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: soonlink-core-${{ matrix.artifact_platform }}
          path: ${{ steps.bundle.outputs.bundle_paths }}
          if-no-files-found: error

  publish:
    needs:
      - metadata
      - bundles
    if: ${{ needs.metadata.outputs.publish_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release asset directory
        shell: bash
        run: mkdir -p dist/release-assets

      - name: Download bundles
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: dist/release-assets
          merge-multiple: true

      - name: Add compose deployment assets
        shell: bash
        run: |
          set -euo pipefail
          cp compose.yaml dist/release-assets/soonlink-core-compose.yaml
          cp compose.release.yaml dist/release-assets/soonlink-core-compose.release.yaml
          cp .env.example dist/release-assets/soonlink-core.env.example

      - name: Build checksum file
        shell: bash
        run: |
          set -euo pipefail
          cd dist/release-assets
          sha256sum ./* > SHA256SUMS

      - name: Build release body
        id: body
        shell: bash
        run: |
          set -euo pipefail

          body_path="dist/release-body.md"
          shopt -s nullglob
          bundle_paths=(
            dist/release-assets/soonlink-core-*.tar.gz
            dist/release-assets/soonlink-core-*.zip
          )

          {
            echo "SoonLink Core release assets for \`${{ needs.metadata.outputs.release_tag }}\`."
            echo
            echo "Package version: \`${{ needs.metadata.outputs.package_version }}\`."
            echo
            if ((${#bundle_paths[@]} > 0)); then
              echo "Included bundles:"
              for bundle_path in "${bundle_paths[@]}"; do
                echo "- $(basename "${bundle_path}")"
              done
            else
              echo "> No platform bundle was attached in this run."
              echo ">"
              echo "> Configure the matching \`CANGJIE_SDK_*_URL\` repository variables to enable binary packaging on GitHub Actions."
            fi
            echo
            echo "Each bundle already includes the runtime binary together with:"
            echo "- web/"
            echo "- config/"
            echo "- README / CHANGELOG"
            echo "- compose and env examples"
            echo
            echo "Included deployment assets:"
            echo "- soonlink-core-compose.yaml"
            echo "- soonlink-core-compose.release.yaml"
            echo "- soonlink-core.env.example"
            echo "- SHA256SUMS"
          } > "${body_path}"

          echo "path=${body_path}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: dist/release-assets/*
          body_path: ${{ steps.body.outputs.path }}
