name: Version Package Preview

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional package version override, defaults to cjpm.toml version
        required: false
        type: string
  push:
    branches:
      - main
      - core
    paths:
      - cjpm.toml
      - .github/workflows/release-artifacts.yml
      - .github/workflows/version-package.yml
      - scripts/build_release_bundle.sh
      - scripts/build_release_target.sh
      - scripts/install_cangjie_ci.sh
      - scripts/prepare_release_workspace.sh

permissions:
  contents: read

jobs:
  package-preview:
    uses: ./.github/workflows/release-artifacts.yml
    with:
      release_tag: ${{ github.event.inputs.release_tag || '' }}
      publish_release: false
    secrets: inherit
