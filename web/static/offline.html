<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1d4ed8">
    <title>SoonLink 应用壳离线</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="/static/icons/app-icon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="soonlink-app soonlink-pwa-offline-shell" data-time-mode="light">
    <main class="app-card soonlink-pwa-offline-card">
        <div class="card-head">
            <div>
                <h1 class="app-title">SoonLink 应用壳离线</h1>
                <p class="app-subtitle">最近打开的页面会尽量保留，但实时设备与传输接口需要网络恢复。</p>
            </div>
        </div>
        <div class="mt-4">
            <div class="stat-chips">
                <span class="stat-chip">应用壳已安装</span>
                <span class="stat-chip">当前网络不可用</span>
            </div>
            <p class="mt-3 mb-2">恢复网络后，SoonLink staticWeb 会重新连接设备、读取目录与继续任务状态。</p>
            <p class="text-muted mb-4">如果你是从桌面或主屏幕启动的应用，这说明应用壳已经接管成功，只是当前节点暂时不可达。</p>
            <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-primary" type="button" onclick="window.location.reload()">重新连接</button>
                <a class="btn btn-outline-secondary" href="/">返回主页</a>
            </div>
        </div>
    </main>
</body>
</html>
