<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body class="soonlink-app dashboard-page" data-role-variant="admin" data-time-mode="light">
    <div class="app-shell">
        <header class="app-header">
            <div class="app-header-brand">
                <span class="brand-dot"></span>
                <div>
                    <h1 class="app-title">SoonLink</h1>
                    <p class="app-subtitle">设备控制中心</p>
                </div>
            </div>
            <div class="app-header-actions">
                <span class="pill" id="dashboard-mode-pill">管理员</span>
                <button type="button" class="btn btn-sm btn-outline-secondary theme-switch-btn pd-fl-cc" id="theme-toggle-btn" title="切换主题">
                    <i class="bi bi-circle-half me-1"></i><span id="theme-toggle-label">自动</span>
                </button>
                <a class="btn btn-sm btn-outline-secondary pd-fl-cc" href="/">
                    <i class="bi bi-house me-1"></i>主页
                </a>
                <a class="btn btn-sm btn-outline-secondary pd-fl-cc" href="/admin">
                    <i class="bi bi-gear me-1"></i>管理
                </a>
            </div>
        </header>

        <main class="app-main">
            <!-- 媒体控制 -->
            <section class="page-content is-active">
                <div class="row g-3">
                    <div class="col-lg-6">
                        <div class="app-card h-100">
                            <div class="card-head">
                                <h2><i class="bi bi-music-note-beamed me-2"></i>媒体控制</h2>
                            </div>
                            <div class="mt-3 text-center">
                                <h5 id="current-track" class="mb-1">获取播放信息中...</h5>
                                <p id="current-artist" class="text-muted mb-1"></p>
                                <p id="current-album" class="small text-muted mb-3"></p>
                                <p id="media-provider" class="small text-muted">正在连接媒体状态...</p>
                            </div>
                            <div class="d-flex justify-content-center gap-2 mt-3">
                                <button class="btn btn-outline-secondary media-control-btn" id="prev-btn" title="上一曲">
                                    <i class="bi bi-skip-start-fill"></i>
                                </button>
                                <button class="btn btn-primary media-control-btn" id="play-pause-btn" title="播放/暂停">
                                    <i class="bi bi-play-fill"></i>
                                </button>
                                <button class="btn btn-outline-secondary media-control-btn" id="stop-btn" title="停止">
                                    <i class="bi bi-stop-fill"></i>
                                </button>
                                <button class="btn btn-outline-secondary media-control-btn" id="next-btn" title="下一曲">
                                    <i class="bi bi-skip-end-fill"></i>
                                </button>
                            </div>
                            <div class="mt-3">
                                <div class="d-flex align-items-center gap-2">
                                    <button class="btn btn-sm btn-link p-0" id="mute-btn">
                                        <i class="bi bi-volume-up-fill"></i>
                                    </button>
                                    <input type="range" class="form-range flex-grow-1" id="volume-slider" min="0" max="100" value="50">
                                    <span class="small text-muted" id="volume-text" style="min-width: 40px;">50%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="app-card h-100">
                            <div class="card-head">
                                <h2><i class="bi bi-cpu me-2"></i>系统状态</h2>
                                <button class="btn btn-sm btn-outline-secondary" id="refresh-all-btn">
                                    <i class="bi bi-arrow-clockwise"></i> 刷新
                                </button>
                            </div>
                            <div class="row mt-3 text-center">
                                <div class="col-3">
                                    <div class="stat-circle" id="cpu-circle">
                                        <span id="cpu-percent">0%</span>
                                    </div>
                                    <small class="text-muted">CPU</small>
                                </div>
                                <div class="col-3">
                                    <div class="stat-circle" id="memory-circle">
                                        <span id="memory-percent">0%</span>
                                    </div>
                                    <small class="text-muted">内存</small>
                                </div>
                                <div class="col-3">
                                    <div class="stat-circle" id="disk-circle">
                                        <span id="disk-percent">0%</span>
                                    </div>
                                    <small class="text-muted">磁盘</small>
                                </div>
                                <div class="col-3">
                                    <div class="stat-circle" id="temp-circle">
                                        <span id="temp-value">--°C</span>
                                    </div>
                                    <small class="text-muted">温度</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 设备信息 -->
                <div class="app-card mt-3">
                    <div class="card-head">
                        <h2><i class="bi bi-pc-display me-2"></i>设备信息</h2>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">主机名</span>
                                    <span class="info-value" id="hostname">获取中...</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">操作系统</span>
                                    <span class="info-value" id="os-info">获取中...</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">运行时间</span>
                                    <span class="info-value" id="uptime">获取中...</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">主IP</span>
                                    <span class="info-value" id="primary-ip">-</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">网关</span>
                                    <span class="info-value" id="network-gateway">-</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">网络收发</span>
                                    <span class="info-value">
                                        <span class="text-muted">↓</span> <span id="network-rx">0 B</span>
                                        <span class="text-muted ms-2">↑</span> <span id="network-tx">0 B</span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 快速操作 -->
                <div class="app-card mt-3">
                    <div class="card-head">
                        <h2><i class="bi bi-lightning me-2"></i>快速操作</h2>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-4">
                            <button class="btn btn-outline-secondary w-100 mb-2" id="refresh-system-btn">
                                <i class="bi bi-arrow-clockwise me-1"></i>刷新系统信息
                            </button>
                        </div>
                        <div class="col-md-4">
                            <button class="btn btn-outline-secondary w-100 mb-2" id="monitor-toggle-btn">
                                <i class="bi bi-eye me-1"></i><span id="monitor-toggle-label">开启实时监控</span>
                            </button>
                        </div>
                        <div class="col-md-4">
                            <a href="/admin" class="btn btn-outline-secondary w-100 mb-2">
                                <i class="bi bi-gear me-1"></i>系统管理
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 详细监控 -->
                <div class="app-card mt-3" id="detailed-monitoring" style="display: none;">
                    <div class="card-head">
                        <h2><i class="bi bi-graph-up me-2"></i>详细监控</h2>
                        <button class="btn btn-sm btn-outline-secondary" id="close-detailed-btn">
                            <i class="bi bi-x"></i>
                        </button>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-3">
                            <h6 class="text-muted mb-2">CPU详情</h6>
                            <div id="cpu-details"></div>
                        </div>
                        <div class="col-md-3">
                            <h6 class="text-muted mb-2">内存详情</h6>
                            <div id="memory-details"></div>
                        </div>
                        <div class="col-md-3">
                            <h6 class="text-muted mb-2">磁盘详情</h6>
                            <div id="disk-details"></div>
                        </div>
                        <div class="col-md-3">
                            <h6 class="text-muted mb-2">网络详情</h6>
                            <div id="network-details"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/icons.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
