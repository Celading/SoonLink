<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1d4ed8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="SoonLink">
    <title>{{.Title}}</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="/static/icons/app-icon.svg">
    <link rel="apple-touch-icon" href="/static/icons/app-icon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body class="soonlink-app" data-role-variant="remote" data-time-mode="light">
    <main class="container py-5">
        <div class="app-card mx-auto login-card">
            <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap">
                <div>
                    <div class="pill login-mode-pill mb-3" id="login-mode-pill">载入访问上下文...</div>
                    <h1 class="h4 mb-3">SoonLink 管理入口</h1>
                    <p class="mb-2" id="login-summary">正在读取当前访问与认证策略。</p>
                    <p class="text-muted mb-4" id="login-detail">配置管理员密码后，可在这里建立临时管理会话。</p>
                </div>
                <div class="login-theme-chip" id="login-theme-chip">主题自动</div>
            </div>

            <div class="login-context-grid">
                <div class="login-context-block">
                    <div class="inspector-label">访问模式</div>
                    <div class="inspector-value" id="login-access-mode">-</div>
                </div>
                <div class="login-context-block">
                    <div class="inspector-label">本机管理员</div>
                    <div class="inspector-value" id="login-is-local-admin">-</div>
                </div>
                <div class="login-context-block">
                    <div class="inspector-label">鉴权策略</div>
                    <div class="inspector-value" id="login-auth-policy">-</div>
                </div>
                <div class="login-context-block">
                    <div class="inspector-label">Provider</div>
                    <div class="inspector-value" id="login-auth-provider">-</div>
                </div>
                <div class="login-context-block">
                    <div class="inspector-label">运行标识</div>
                    <div class="inspector-value" id="login-runtime-label">-</div>
                </div>
                <div class="login-context-block">
                    <div class="inspector-label">客户端来源</div>
                    <div class="inspector-value inspector-break" id="login-network-origin">-</div>
                </div>
            </div>

            <form id="login-password-form" class="file-preview-wrap mt-4" style="display: none;">
                <div class="preview-head">
                    <span>管理员密码</span>
                    <span class="text-muted small">env-only runtime secret</span>
                </div>
                <div class="mt-3">
                    <label class="form-label" for="login-password-input">输入 `SOONLINK_ADMIN_PASSWORD`</label>
                    <input type="password" class="form-control" id="login-password-input" autocomplete="current-password" placeholder="管理员密码">
                </div>
                <div class="d-flex gap-2 flex-wrap mt-3">
                    <button type="submit" class="btn btn-primary" id="login-submit-button">建立管理会话</button>
                    <button type="button" class="btn btn-outline-secondary" id="login-logout-button" style="display: none;">退出会话</button>
                </div>
                <div class="text-muted small mt-3" id="login-form-status">密码不会写入 SoonLink 配置文件。</div>
            </form>

            <div class="file-preview-wrap mt-4">
                <div class="preview-head">
                    <span>能力说明</span>
                    <span class="text-muted small">当前认证 provider 暴露能力</span>
                </div>
                <div id="login-capabilities" class="login-capabilities-list mt-3"></div>
            </div>

            <div class="d-flex gap-2 flex-wrap mt-4">
                <a href="/" class="btn btn-primary">返回主页面</a>
                <a href="/admin" class="btn btn-outline-secondary" id="login-admin-link">进入管理员面板</a>
            </div>
        </div>
    </main>
    <script src="/static/js/icons.js"></script>
    <script src="/static/js/pwa.js"></script>
    <script src="/static/js/login.js"></script>
</body>
</html>
