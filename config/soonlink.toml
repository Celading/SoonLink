[soonlink]
listen_addr = ":8080"
web_port = "8081"
temp_dir = "/tmp/soonlink"
max_connections = "100"
encryption_key = ""
cert_file = ""
key_file = ""
device_registry_file = "./config/devices.json"
log_dir = "./logs"
security_mode = "encrypted"
discovery_udp_port = "19090"
enable_mdns = "true"
discovery_heartbeat_seconds = "30"
local_auth_trust_proxy_headers = "false"
relay_enabled = "true"
relay_cache_dir = "./cache/relay"
relay_retention_hours = "24"
relay_limit_mode = "fixed"
relay_limit_bytes = "21474836480"
relay_limit_percent = "10"
favorites_store_mode = "cache"
favorites_toml_file = "./config/favorites.toml"
whitelist_toml_file = "./config/whitelist.toml"
