[package]
  cjc-version = "1.0.0"
  version = "0.5.56"
  name = "soonlnk"
  output-type = "executable"
  src-dir = "src"
  compile-option = "-Woff unused"
  description = "SoonLink / 溯联 file transfer service powered by Ignite"

[dependencies]
  ignite = { git = "https://gitcode.com/cinyu/ignite-cangjie.git" }
  lisi = { git = "https://gitcode.com/cinyu/lisi" }

[target.x86_64-w64-mingw32]
  link-option = "-lcrypt32"
  [target.x86_64-w64-mingw32.bin-dependencies]
    path-option = ["${CANGJIE_STDX_PATH}/windows_x86_64_cjnative/static/stdx"]
  [target.x86_64-w64-mingw32-Deprecated.bin-dependencies]
    path-option = ["${CANGJIE_STDX_PATH}/cj_stdx_x86_64-w64-mingw32/static/stdx"]

[target.aarch64-apple-darwin]
  [target.aarch64-apple-darwin.bin-dependencies]
    path-option = ["${CANGJIE_STDX_PATH}/cj_stdx_darwin_aarch64_llvm/static/stdx"]

[target.aarch64-linux-ohos]
  compile-option = "-B \"${DEVECO_CANGJIE_HOME}/compiler/third_party/llvm/bin\" -B \"${DEVECO_CANGJIE_HOME}/musl/usr/lib/aarch64-linux-ohos\" -L \"${DEVECO_CANGJIE_HOME}/musl/usr/lib/aarch64-linux-ohos\" --sysroot \"${DEVECO_CANGJIE_HOME}/musl\""

[target.aarch64-linux-ohos.bin-dependencies]
  path-option = ["${CANGJIE_STDX_PATH}/linux_ohos_aarch64_cjnative/static/stdx"]

[target.aarch64-linux-ohos-cjnative]
  [target.aarch64-linux-ohos-cjnative.bin-dependencies]
    path-option = ["${CANGJIE_STDX_PATH}/linux_ohos_aarch64_cjnative/static/stdx"]

[target.x86_64-apple-darwin]
  [target.x86_64-apple-darwin.bin-dependencies]
    path-option = ["${CANGJIE_STDX_PATH}/cj_stdx_darwin_x86_64_llvm/static/stdx"]

[target.x86_64-unknown-linux-gnu]
  [target.x86_64-unknown-linux-gnu.bin-dependencies]
    path-option = ["${CANGJIE_STDX_PATH}/linux_x86_64_llvm/static/stdx"]

[target.aarch64-unknown-linux-gnu]
  [target.aarch64-unknown-linux-gnu.bin-dependencies]
    path-option = ["${CANGJIE_STDX_PATH}/linux_aarch64_llvm/static/stdx"]
